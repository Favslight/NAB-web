name: Deploy Next NAB

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.NAB_SECRET }}
          script: |
            cd /root/NAB/NAB-web
            git fetch --all
            git reset --hard origin/main
            npm install
            npm run build
            systemctl reload nginx
            pm2 start npm --name NABweb -- start -- -p 3005
